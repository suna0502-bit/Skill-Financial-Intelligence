<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務智匯 Skill — 極致美感理財助手</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient-start: #f6f8fd;
            --bg-gradient-end: #edf1f7;
            --panel-bg: rgba(255, 255, 255, 0.6);
            --border-color: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-muted: #334155;
            --text-dim: #64748b;
            --accent-blue: #1d4ed8;
            --accent-teal: #10b981;
            --accent-coral: #e11d48;
            --accent-purple: #7c3aed;
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-gradient-start);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Ambient Liquid Mesh Background */
        .bg-mesh-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            filter: blur(130px) saturate(180%);
            opacity: 0.48;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, #ff007f 0%, rgba(255, 0, 127, 0) 70%);
            animation: drift-blobs-1 25s infinite ease-in-out alternate;
        }

        .blob-2 {
            bottom: -15%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, #00f5d4 0%, rgba(0, 245, 212, 0) 70%);
            animation: drift-blobs-2 30s infinite ease-in-out alternate;
        }

        .blob-3 {
            top: 25%;
            right: -15%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #7c3aed 0%, rgba(124, 58, 237, 0) 70%);
            animation: drift-blobs-3 28s infinite ease-in-out alternate;
        }

        .blob-4 {
            bottom: 20%;
            left: -15%;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #3a86ff 0%, rgba(58, 134, 255, 0) 70%);
            animation: drift-blobs-4 22s infinite ease-in-out alternate;
        }

        @keyframes drift-blobs-1 {
            0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            50% { transform: translate3d(8vw, 12vh, 0) scale(1.15) rotate(180deg); }
            100% { transform: translate3d(-5vw, -8vh, 0) scale(0.9) rotate(360deg); }
        }
        @keyframes drift-blobs-2 {
            0% { transform: translate3d(0, 0, 0) scale(1.1) rotate(0deg); }
            50% { transform: translate3d(-12vw, -10vh, 0) scale(0.9) rotate(-180deg); }
            100% { transform: translate3d(6vw, 15vh, 0) scale(1.2) rotate(-360deg); }
        }
        @keyframes drift-blobs-3 {
            0% { transform: translate3d(0, 0, 0) scale(0.95) rotate(0deg); }
            50% { transform: translate3d(10vw, -15vh, 0) scale(1.25) rotate(120deg); }
            100% { transform: translate3d(-8vw, 5vh, 0) scale(1) rotate(240deg); }
        }
        @keyframes drift-blobs-4 {
            0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
            50% { transform: translate3d(-8vw, 10vh, 0) scale(0.85) rotate(-120deg); }
            100% { transform: translate3d(12vw, -5vh, 0) scale(1.1) rotate(-240deg); }
        }

        /* Glassmorphism Layout */
        .portal-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-coral) 0%, var(--accent-purple) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(225, 29, 72, 0.25);
        }

        .brand-logo i {
            color: #fff;
            font-size: 1.3rem;
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--accent-coral);
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(225, 29, 72, 0.08);
            border: 1px solid rgba(225, 29, 72, 0.15);
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Splash Card */
        .hero-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 28px;
            padding: 45px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        /* Spinner & Progress indicator */
        .spinner-container {
            position: relative;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(29, 78, 216, 0.06);
            border-top: 4px solid var(--accent-blue);
            border-right: 4px solid var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.53, 0.21, 0.29, 0.87) infinite;
        }

        .spinner-icon {
            position: absolute;
            font-size: 1.4rem;
            color: var(--accent-blue);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.12); opacity: 1; color: var(--accent-purple); }
        }

        .status-text {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .sub-status {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-top: -15px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            border: none;
            color: #fff;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.18);
            opacity: 0.7;
            transition: var(--transition-smooth);
        }

        .cta-btn:hover {
            opacity: 1;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(29, 78, 216, 0.3);
        }

        footer {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Living Organic Liquid Mesh Background -->
    <div class="bg-mesh-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="portal-wrapper">
        <!-- Header -->
        <header>
            <div class="brand-logo">
                <i class="fa-solid fa-scale-balanced"></i>
            </div>
            <h1>財務智匯<span>Skill</span></h1>
        </header>

        <!-- Splash Card -->
        <div class="hero-panel">
            <div class="spinner-container">
                <div class="spinner"></div>
                <i class="fa-solid fa-bolt spinner-icon"></i>
            </div>
            <div class="status-text">系統載入中</div>
            <div class="sub-status">正在引導進入主儀表板...</div>
            
            <a href="/dashboard" id="redirect-link" class="cta-btn">
                <span>若未跳轉，請點擊此處</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

        <!-- Footer -->
        <footer>
            <span>© 2026 Antigravity Dev Team. Crafted with Glassmorphic Aesthetics.</span>
        </footer>
    </div>

    <script>
        // 智能分析運行環境並進行秒級自動跳轉
        const redirectUrl = window.location.protocol === 'file:' ? 'public/index.html' : '/dashboard';
        
        // 更新備用連結
        document.getElementById('redirect-link').href = redirectUrl;
        
        // 延遲 1.2 秒（讓使用者感受精緻的流光極光 Splash 動畫美感後）自動流暢跳轉
        setTimeout(function() {
            window.location.replace(redirectUrl);
        }, 1200);
    </script>
</body>
</html>
